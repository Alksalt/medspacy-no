name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check lockfile
        run: uv lock --check
      - name: Sync dependencies
        run: uv sync --locked --dev
      - name: Validate bundled resources
        run: uv run --locked python scripts/validate_resources.py
      - name: Validate owner review worksheet
        run: uv run --locked python scripts/check_owner_review.py
      - name: Compile
        run: uv run --locked python -m compileall src/medspacy_no scripts tests
      - name: Test
        run: uv run --locked python -m pytest
      - name: Build artifacts
        run: uv run --locked python -m build --no-isolation
